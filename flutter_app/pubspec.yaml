name: nabrah_app
description: "تطبيق نبرة للهواتف الذكية - المنصة المتكاملة لتقويم وتحسين الأداء الصوتي اللغوي العربي وعلاج اضطرابات النطق بأحدث محركات الذكاء الاصطناعي."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  record: ^5.1.2
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.2.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
