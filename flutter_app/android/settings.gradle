include ':app'

def localProperties = new Properties()
def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty("flutter.sdk")
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv("FLUTTER_ROOT")
}
if (flutterSdkPath == null) {
    flutterSdkPath = "/usr/local/flutter"
}

evaluate(new File("${flutterSdkPath}/packages/flutter_tools/gradle/settings_plugin_loader.gradle"))
